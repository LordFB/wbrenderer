<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>WBrenderer M4 — Scene</title>
  <style>
    body { margin: 0; background: #111; color: #ccc; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    canvas { image-rendering: pixelated; border: 1px solid #333; cursor: grab; }
    canvas:active { cursor: grabbing; }
    #hud { margin-top: 8px; font-size: 12px; }
  </style>
</head>
<body>
  <h2>WBrenderer M4 — Carmageddon Junkyard</h2>
  <canvas id="cv" width="800" height="600"></canvas>
  <div id="hud">drag to orbit · loading…</div>

  <script type="module">
    import { Pixelmap, TYPE } from '../src/pixelmap/Pixelmap.js';
    import { Renderer } from '../src/render/Renderer.js';
    import { Actor, ACTOR_TYPE } from '../src/scene/Actor.js';
    import { Camera } from '../src/scene/Camera.js';
    import { Light, LIGHT_TYPE } from '../src/scene/Light.js';
    import { SceneRoot } from '../src/scene/SceneRoot.js';
    import { Fog } from '../src/render/fog.js';
    import { Material } from '../src/scene/Material.js';
    import { Model, makeVertices } from '../src/scene/Model.js';
    import { loadDat } from '../src/fmt/datLoader.js';
    import * as Mat34 from '../src/math/Mat34.js';

    const W = 800, H = 600;
    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');
    const img = ctx.createImageData(W, H);
    const color = new Pixelmap(W, H, TYPE.RGBX_8888);
    const depth = new Pixelmap(W, H, TYPE.DEPTH_F32);
    const renderer = new Renderer(color, depth);
    const hud = document.getElementById('hud');

    const NAME_COLOURS = {
      'BGLSPIKE.MAT':  0x202020,
      'BGLSIDE.MAT':   0xc8c8c8,
      'BGLNOSE.MAT':   0xd0d0d0,
      'BGLBOT.MAT':    0x202020,
      'BGLUNDER.MAT':  0x404040,
      'BGLTOP.MAT':    0xc04040,
      'DARKRED.MAT':   0x801010,
      'DRSKY.MAT':     0x6090d0,
    };
    function colourFor(name, tint = 0xffffff) {
      let c;
      if (NAME_COLOURS[name] !== undefined) c = NAME_COLOURS[name];
      else {
        let h = 0;
        for (let i = 0; i < name.length; i++) h = ((h * 31 + name.charCodeAt(i)) >>> 0);
        c = (h & 0xffffff) | 0x808080;
      }
      // Apply tint per car (multiplicative).
      const r = Math.min(255, ((c >> 16) & 0xff) * ((tint >> 16) & 0xff) / 255);
      const g = Math.min(255, ((c >> 8)  & 0xff) * ((tint >> 8)  & 0xff) / 255);
      const b = Math.min(255, ( c        & 0xff) * ( tint        & 0xff) / 255);
      return (r << 16) | (g << 8) | b;
    }

    function makeGround(size = 50, divs = 16) {
      // Subdivided grid: small tiles let the near-plane rejection drop only
      // the quads that actually straddle the camera, instead of the whole
      // plane. Proper near-plane clipping is M5 work.
      const s = size, n = divs;
      const step = (2 * s) / n;
      const positions = [];
      for (let j = 0; j <= n; j++) {
        for (let i = 0; i <= n; i++) {
          positions.push(-s + i * step, 0, -s + j * step);
        }
      }
      const faces = [];
      for (let j = 0; j < n; j++) {
        for (let i = 0; i < n; i++) {
          const a = j * (n + 1) + i;
          const b = a + 1;
          const c = a + (n + 1);
          const d = c + 1;
          // CCW from above (outward normal +Y)
          faces.push(a, d, b, a, c, d);
        }
      }
      const verts = makeVertices(new Float32Array(positions), null, new Float32Array(positions.length / 3 * 2));
      return new Model(verts, new Uint16Array(faces), { name: 'ground' });
    }

    async function main() {
      const res = await fetch('data/EAGLE.DAT');
      if (!res.ok) { hud.textContent = 'Failed to load EAGLE.DAT'; return; }
      const ab = await res.arrayBuffer();
      const eagleModel = loadDat(ab)[0];

      const scene = new SceneRoot();
      scene.ambient = 0.05;
      scene.fog = new Fog({ colour: 0xc06030, hither: 15, yon: 45 });

      // Three Eagles in a row, each with a different body colour swapped
      // in for BGLTOP.MAT (the rest of the palette stays consistent).
      const bodyColours = [0xc04040, 0x40a040, 0x4060c0];
      const positions = [[-3, 0, -8], [0, 0, -10], [3, 0, -12]];
      for (let i = 0; i < 3; i++) {
        const mats = eagleModel.materialNames.map(nm => {
          if (nm === 'BGLTOP.MAT') return new Material({ name: nm, colour: bodyColours[i] });
          return new Material({ name: nm, colour: colourFor(nm) });
        });
        const car = new Actor({ type: ACTOR_TYPE.MODEL, model: eagleModel, material: 0x808080 });
        car.materials = mats;
        car._offsetIndex = i;
        car._basePos = positions[i];
        scene.add(car);
      }

      // Ground plane — big grey quad
      const groundActor = new Actor({ type: ACTOR_TYPE.MODEL, model: makeGround(40), material: 0x405060 });
      Mat34.translation(groundActor.transform, 0, -0.4, -10);
      scene.add(groundActor);

      // Sun — directional, slightly warm. Intensity 0.7 leaves headroom for
      // the point light without saturating channels above 255.
      const sun = new Actor({ type: ACTOR_TYPE.LIGHT });
      sun.light = new Light({ type: LIGHT_TYPE.DIRECT, colour: 0xfff0d0, intensity: 0.7 });
      Mat34.rotationX(sun.transform, -1.0);
      scene.add(sun);

      // Cool point light above the middle car. With distance ~3 and
      // attenC=1, attenL=0.3, attenQ=0.1, attenuator at d=3 ≈ 1+0.9+0.9=2.8,
      // so effective intensity is ~0.32 — visible cool tint without blowing
      // anyone out.
      const lamp = new Actor({ type: ACTOR_TYPE.LIGHT });
      lamp.light = new Light({ type: LIGHT_TYPE.POINT, colour: 0x80a0ff, intensity: 0.9, attenC: 1, attenL: 0.3, attenQ: 0.1 });
      Mat34.translation(lamp.transform, 0, 3, -10);
      scene.add(lamp);

      const cam = new Actor({ type: ACTOR_TYPE.CAMERA });
      cam.camera = new Camera({ fovY: Math.PI / 3, aspect: W / H, hither: 0.1, yon: 60 });
      scene.add(cam);

      // Mouse-drag orbit around (0, 0, -10). Positive pitch lifts the
      // camera above the ground plane.
      let yaw = 0.3, pitch = 0.35, dist = 14;
      let dragging = false, lastX = 0, lastY = 0;
      const target = [0, 0, -10];
      cv.addEventListener('pointerdown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; cv.setPointerCapture(e.pointerId); });
      cv.addEventListener('pointerup',   e => { dragging = false; cv.releasePointerCapture(e.pointerId); });
      cv.addEventListener('pointermove', e => {
        if (!dragging) return;
        yaw += (e.clientX - lastX) * 0.01;
        pitch = Math.max(-1.2, Math.min(1.2, pitch + (e.clientY - lastY) * 0.01));
        lastX = e.clientX; lastY = e.clientY;
      });
      cv.addEventListener('wheel', e => { dist = Math.max(3, Math.min(40, dist + e.deltaY * 0.02)); e.preventDefault(); }, { passive: false });

      let frames = 0, lastT = performance.now();

      function setOrbitCamera() {
        const cy = Math.cos(yaw), sy = Math.sin(yaw);
        const cp = Math.cos(pitch), sp = Math.sin(pitch);
        const eye = [target[0] + dist * cp * sy, target[1] + dist * sp, target[2] + dist * cp * cy];
        // Build camera world matrix manually: forward = target - eye, up = +Y.
        const fx = target[0] - eye[0], fy = target[1] - eye[1], fz = target[2] - eye[2];
        const fl = Math.hypot(fx, fy, fz) || 1;
        const fnx = fx / fl, fny = fy / fl, fnz = fz / fl;
        // right = forward × up  (with up = (0,1,0))
        //   right.x = fny·0 − fnz·1 = −fnz
        //   right.y = fnz·0 − fnx·0 = 0
        //   right.z = fnx·1 − fny·0 = fnx
        let rx = -fnz;
        let ry = 0;
        let rz = fnx;
        const rl = Math.hypot(rx, ry, rz) || 1;
        rx /= rl; ry /= rl; rz /= rl;
        // up = right × forward
        const ux = ry * fnz - rz * fny;
        const uy = rz * fnx - rx * fnz;
        const uz = rx * fny - ry * fnx;
        // Camera basis: X=right, Y=up, Z=-forward. Mat34 rows store basis.
        const m = cam.transform;
        m[0] = rx; m[1] = ry; m[2] = rz;
        m[3] = ux; m[4] = uy; m[5] = uz;
        m[6] = -fnx; m[7] = -fny; m[8] = -fnz;
        m[9] = eye[0]; m[10] = eye[1]; m[11] = eye[2];
      }

      function frame(tMs) {
        const t = tMs * 0.001;

        // Spin each car a bit
        let i = 0;
        for (const child of scene.children) {
          if (child.type !== ACTOR_TYPE.MODEL || child._basePos === undefined) continue;
          const idx = child._offsetIndex;
          const rotY = Mat34.create();
          const scl = Mat34.create();
          const trn = Mat34.create();
          const tmp = Mat34.create();
          const tmp2 = Mat34.create();
          Mat34.rotationY(rotY, t * (0.4 + idx * 0.1) + idx);
          Mat34.identity(scl); scl[0] = scl[4] = scl[8] = 4;
          Mat34.translation(trn, child._basePos[0], child._basePos[1], child._basePos[2]);
          Mat34.multiply(tmp, rotY, scl);
          Mat34.multiply(tmp2, trn, tmp);
          child.transform.set(tmp2);
          i++;
        }

        setOrbitCamera();

        renderer.clear(0xc06030);
        renderer.renderTree(scene, cam);
        color.blitToImageData(img);
        ctx.putImageData(img, 0, 0);

        frames++;
        const now = performance.now();
        if (now - lastT >= 500) {
          const fps = (frames * 1000 / (now - lastT)).toFixed(1);
          hud.textContent = `drag to orbit · wheel to zoom · ${fps} fps`;
          frames = 0; lastT = now;
        }
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }
    main();
  </script>
</body>
</html>
